<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Gov</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <form id="loginForm" class="card">
            <h2>Acesso ao sistema</h2>

            <div class="inputin">
                <label> Email</label>
                <input type="text" id="loginEmail" placeholder=" email">
            </div>

            <div class="inputin">
                <label>Senha</label>
                <input type="password" id="loginSenha" placeholder="Digite sua senha">
            </div>

            <button type="submit">Entrar</button>

            <p class="link">
                Não tem conta?
                <a href="#" onclick="mostrarCadastro()">Criar conta</a>
            </p>
        </form>

        <form id="cadastroForm" class="card" style="display:none;">
            <h2>Criar conta</h2>

            <div class="inputin">
                <label>Nome completo</label>
                <input type="text" id="cadastroNome" placeholder="Seu nome">
            </div>

            <div class="inputin">
                <label>Email</label>
                <input type="email" id="cadastroEmail" placeholder="Seu email">
            </div>

            <div class="inputin">
                <label>Senha</label>
                <input type="password" id="cadastroSenha" placeholder="Crie uma senha">
            </div>

            <button type="submit">Cadastrar</button>

            <p class="link">
                Já tem conta?
                <a href="#" onclick="mostrarLogin()">Voltar ao login</a>
            </p>
        </form>

    </div>
    <script src="scripts.js"></script>
</body>

</html>
